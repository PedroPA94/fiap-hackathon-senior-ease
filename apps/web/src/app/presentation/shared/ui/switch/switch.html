<label class="switch" [for]="inputId()">
  <span class="switch__label">
    {{ label() }}
  </span>

  <span class="switch__control">
    <input
      class="switch__input"
      type="checkbox"
      role="switch"
      [id]="inputId()"
      [checked]="checked()"
      (change)="handleChange($event)"
      (blur)="handleBlur()"
    />

    <span class="switch__track" aria-hidden="true">
      <span class="switch__thumb"></span>
    </span>
  </span>
</label>
